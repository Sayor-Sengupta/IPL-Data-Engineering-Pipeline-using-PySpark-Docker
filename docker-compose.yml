version: '3.8'

services:

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - spark-net

  # ---------------- AIRFLOW INIT ----------------
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    entrypoint: /bin/bash
    command: >
      -c "
      sleep 10 &&
      airflow db init &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL} --password ${AIRFLOW_ADMIN_PASSWORD}
      "
    networks:
      - spark-net

  # ---------------- AIRFLOW WEBSERVER ----------------
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
      - airflow-scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - .:/opt/spark-app   # 👈 IMPORTANT (your project)
      - /var/run/docker.sock:/var/run/docker.sock  # 👈 docker access
      - ./jobs:/opt/airflow/jobs 
      
    ports:
      - "8084:8080"
    command: webserver
    networks:
      - spark-net

  # ---------------- AIRFLOW SCHEDULER --------a--------
  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - .:/opt/spark-app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jobs:/opt/airflow/jobs 
    command: scheduler
    networks:
      - spark-net

  # ---------------- SPARK MASTER ----------------
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8082:8080"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
    volumes:
      - .:/opt/spark-app
    networks:
      - spark-net

  # ---------------- SPARK WORKER ----------------
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=4G
    volumes:
      - .:/opt/spark-app
    networks:
      - spark-net

# ---------------- NETWORK ----------------
networks:
  spark-net:
    driver: bridge

# ---------------- VOLUMES ----------------
volumes:
  postgres_data: